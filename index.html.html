<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanderlande Module Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --ink: #14171c;
    --steel: #2b3340;
    --line: #d9dde3;
    --paper: #f5f6f8;
    --signal: #e8511d;      /* Vanderlande-ish industrial orange */
    --signal-dark: #c1410f;
    --ok: #1f9d57;
    --warn: #d98a00;
    --mute: #6b7480;
    --card: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  .app { max-width: 720px; margin: 0 auto; min-height: 100%; background: var(--paper); }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    background: var(--ink); color: #fff;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar .mark {
    width: 30px; height: 30px; border-radius: 6px;
    background: var(--signal); display: grid; place-items: center;
    font-weight: 800; font-size: 16px; color: #fff;
    flex: none;
  }
  .topbar .title { font-weight: 700; letter-spacing: .2px; font-size: 15px; }
  .topbar .sub { font-size: 11px; color: #9aa3b0; margin-top: -2px; }
  .topbar .spacer { flex: 1; }
  .topbar button {
    background: transparent; border: 1px solid #3a4150; color: #cfd5de;
    border-radius: 7px; padding: 7px 12px; font-size: 12.5px; cursor: pointer;
    font-weight: 600;
  }
  .topbar button:hover { border-color: var(--signal); color: #fff; }

  .wrap { padding: 18px; }

  /* Module header */
  .mod-head {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 18px; margin-bottom: 16px;
  }
  .mod-id {
    display: inline-block; font-family: 'SFMono-Regular', ui-monospace, monospace;
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    color: var(--signal-dark); background: #fdece4;
    padding: 4px 9px; border-radius: 5px; margin-bottom: 10px;
  }
  .mod-name { font-size: 22px; font-weight: 800; line-height: 1.2; }
  .mod-loc { color: var(--mute); font-size: 13.5px; margin-top: 4px; }
  .status-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .pill {
    font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 20px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pill.ok { background: #e6f5ed; color: var(--ok); }
  .pill.warn { background: #fcf2dc; color: var(--warn); }
  .pill.neutral { background: #eef0f3; color: var(--steel); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  /* Section tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 14px; background: #e9ebef; padding: 4px; border-radius: 11px; }
  .tabs button {
    flex: 1; border: none; background: transparent; padding: 9px; border-radius: 8px;
    font-size: 13px; font-weight: 600; color: var(--mute); cursor: pointer;
  }
  .tabs button.active { background: var(--card); color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

  /* Resource list */
  .res {
    display: flex; align-items: center; gap: 13px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px; margin-bottom: 10px;
    cursor: pointer; text-decoration: none; color: inherit;
    transition: border-color .15s, transform .05s;
  }
  .res:hover { border-color: var(--signal); }
  .res:active { transform: scale(.995); }
  .res .ic {
    width: 42px; height: 42px; border-radius: 9px; flex: none;
    display: grid; place-items: center; font-size: 19px;
  }
  .ic.pdf { background: #fdece4; }
  .ic.vid { background: #e7eefb; }
  .ic.guide { background: #eaf6ee; }
  .res .meta { flex: 1; min-width: 0; }
  .res .meta .h { font-weight: 650; font-size: 14.5px; }
  .res .meta .s { font-size: 12.5px; color: var(--mute); margin-top: 1px; }
  .res .chev { color: #b9c0c9; font-size: 18px; }

  /* Video embed */
  .video-frame {
    width: 100%; aspect-ratio: 16/9; border-radius: 12px; border: 1px solid var(--line);
    background: #000; margin-bottom: 10px; overflow: hidden;
  }
  .video-frame iframe { width: 100%; height: 100%; border: 0; }

  /* Health placeholder */
  .health-soon {
    background: var(--card); border: 1px dashed var(--line); border-radius: 12px;
    padding: 28px 20px; text-align: center; color: var(--mute);
  }
  .health-soon .big { font-size: 15px; font-weight: 700; color: var(--steel); margin-bottom: 5px; }

  /* Home / directory */
  .home-intro { margin-bottom: 18px; }
  .home-intro h1 { font-size: 20px; font-weight: 800; }
  .home-intro p { color: var(--mute); font-size: 14px; margin-top: 4px; }
  .dir-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 15px; margin-bottom: 10px; display: flex; align-items: center;
    gap: 13px; cursor: pointer; text-decoration: none; color: inherit;
  }
  .dir-card:hover { border-color: var(--signal); }
  .dir-card .qmark {
    width: 44px; height: 44px; border-radius: 9px; background: var(--ink);
    display: grid; place-items: center; flex: none;
  }
  .dir-card .qmark svg { width: 26px; height: 26px; }
  .dir-card .info { flex: 1; }
  .dir-card .info .n { font-weight: 700; font-size: 15px; }
  .dir-card .info .c { font-family: ui-monospace, monospace; font-size: 11.5px; color: var(--signal-dark); }

  /* QR modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(10,12,16,.55);
    display: none; place-items: center; z-index: 50; padding: 20px;
  }
  .modal-bg.show { display: grid; }
  .modal {
    background: #fff; border-radius: 16px; padding: 24px; max-width: 340px; width: 100%;
    text-align: center;
  }
  .modal h3 { font-size: 16px; margin-bottom: 4px; }
  .modal .mid { font-family: ui-monospace, monospace; color: var(--signal-dark); font-size: 13px; margin-bottom: 16px; }
  #qrbox { display: grid; place-items: center; margin: 0 auto 16px; }
  #qrbox img, #qrbox canvas { border-radius: 8px; }
  .modal .url { font-size: 11px; color: var(--mute); word-break: break-all; margin-bottom: 16px; }
  .modal button {
    background: var(--signal); color: #fff; border: none; padding: 11px 20px;
    border-radius: 9px; font-weight: 650; font-size: 14px; cursor: pointer; width: 100%;
  }
  .modal .close { background: #eef0f3; color: var(--steel); margin-top: 8px; }

  .back { display: inline-flex; align-items: center; gap: 6px; color: var(--mute);
    font-size: 13.5px; font-weight: 600; cursor: pointer; margin-bottom: 14px; }
  .back:hover { color: var(--ink); }

  .foot { text-align: center; color: #aab1bb; font-size: 11.5px; padding: 24px 0 30px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="mark">V</div>
    <div>
      <div class="title">Module Hub</div>
      <div class="sub">Vanderlande site operations</div>
    </div>
    <div class="spacer"></div>
    <button onclick="location.hash='#/'">All modules</button>
  </div>
  <div class="wrap" id="view"></div>
  <div class="foot">MVP · content demo · health data coming later</div>
</div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeQR()">
  <div class="modal">
    <h3 id="qr-name">Module</h3>
    <div class="mid" id="qr-id">—</div>
    <div id="qrbox"></div>
    <div class="url" id="qr-url"></div>
    <button onclick="printQR()">Print label</button>
    <button class="close" onclick="closeQR()">Close</button>
  </div>
</div>

<script>
// ---- Data: this is the "content map". Add a module here = it works everywhere. ----
const MODULES = {
  "CONV-042": {
    name: "Belt Conveyor Drive Unit",
    location: "Hall 2 · Line A · Position 042",
    status: "operational",
    resources: [
      { type:"pdf",   title:"Drive Unit Maintenance Manual", sub:"PDF · 48 pages · rev. 3.2", url:"#" },
      { type:"pdf",   title:"Lubrication Schedule", sub:"PDF · 2 pages", url:"#" },
      { type:"guide", title:"Belt Tension Adjustment", sub:"Step-by-step · 6 steps", url:"#" },
    ],
    videos: [
      { title:"Drive belt replacement", embed:"https://www.youtube.com/embed/aqz-KE-bpKQ" },
    ],
  },
  "SORT-017": {
    name: "Cross-Belt Sorter Carrier",
    location: "Hall 4 · Sortation · Carrier 017",
    status: "attention",
    resources: [
      { type:"pdf",   title:"Sorter Carrier Service Guide", sub:"PDF · 72 pages · rev. 5.0", url:"#" },
      { type:"guide", title:"Carrier Alignment Procedure", sub:"Step-by-step · 9 steps", url:"#" },
      { type:"pdf",   title:"Fault Code Reference", sub:"PDF · 14 pages", url:"#" },
    ],
    videos: [
      { title:"Carrier removal & inspection", embed:"https://www.youtube.com/embed/aqz-KE-bpKQ" },
    ],
  },
  "PALLET-009": {
    name: "Palletizer Robot Cell",
    location: "Hall 1 · Packing · Cell 009",
    status: "operational",
    resources: [
      { type:"pdf",   title:"Robot Cell Operations Manual", sub:"PDF · 96 pages · rev. 2.1", url:"#" },
      { type:"guide", title:"Safe Entry & Lockout", sub:"Step-by-step · 7 steps", url:"#" },
    ],
    videos: [
      { title:"Gripper calibration walkthrough", embed:"https://www.youtube.com/embed/aqz-KE-bpKQ" },
    ],
  },
};

const ICONS = {
  pdf:   ['pdf','📄'],
  vid:   ['vid','▶'],
  guide: ['guide','📋'],
};
const STATUS = {
  operational: ['ok','Operational'],
  attention:   ['warn','Needs attention'],
};

let activeTab = 'manuals';

function render() {
  const hash = location.hash || '#/';
  const m = hash.match(/#\/module\/(.+)$/);
  if (m) renderModule(decodeURIComponent(m[1]));
  else renderHome();
}

function renderHome() {
  const v = document.getElementById('view');
  let html = `<div class="home-intro">
    <h1>Scan a module to begin</h1>
    <p>Point your phone camera at the QR label on any module. Or pick one below to preview, and tap the QR icon to get its printable label.</p>
  </div>`;
  for (const [id, mod] of Object.entries(MODULES)) {
    html += `<div class="dir-card">
      <div class="qmark" onclick="event.stopPropagation();showQR('${id}')" title="Show QR label">
        <svg viewBox="0 0 24 24" fill="none" stroke="#e8511d" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><line x1="14" y1="14" x2="14" y2="21"/><line x1="18" y1="14" x2="21" y2="14"/><line x1="21" y1="17" x2="21" y2="21"/></svg>
      </div>
      <div class="info" onclick="location.hash='#/module/${id}'">
        <div class="n">${mod.name}</div>
        <div class="c">${id}</div>
      </div>
      <div class="chev" onclick="location.hash='#/module/${id}'" style="color:#b9c0c9;font-size:20px">›</div>
    </div>`;
  }
  v.innerHTML = html;
}

function renderModule(id) {
  const v = document.getElementById('view');
  const mod = MODULES[id];
  if (!mod) {
    v.innerHTML = `<div class="back" onclick="location.hash='#/'">‹ All modules</div>
      <div class="health-soon"><div class="big">Module ${id} not found</div>
      This code isn't in the system yet. Check the label or contact your supervisor.</div>`;
    return;
  }
  const [sCls, sLabel] = STATUS[mod.status] || ['neutral','Unknown'];
  let html = `<div class="back" onclick="location.hash='#/'">‹ All modules</div>
    <div class="mod-head">
      <span class="mod-id">${id}</span>
      <div class="mod-name">${mod.name}</div>
      <div class="mod-loc">${mod.location}</div>
      <div class="status-row">
        <span class="pill ${sCls}"><span class="dot"></span>${sLabel}</span>
        <span class="pill neutral">${mod.resources.length} documents</span>
        <span class="pill neutral">${mod.videos.length} videos</span>
      </div>
    </div>
    <div class="tabs">
      <button class="${activeTab==='manuals'?'active':''}" onclick="setTab('manuals')">Manuals</button>
      <button class="${activeTab==='videos'?'active':''}" onclick="setTab('videos')">Videos</button>
      <button class="${activeTab==='health'?'active':''}" onclick="setTab('health')">Health</button>
    </div>
    <div id="tabbody"></div>`;
  v.innerHTML = html;
  renderTab(id);
}

function setTab(t){ activeTab = t; renderModule(currentId()); }
function currentId(){ const m=(location.hash||'').match(/#\/module\/(.+)$/); return m?decodeURIComponent(m[1]):null; }

function renderTab(id){
  const mod = MODULES[id];
  const b = document.getElementById('tabbody');
  if (activeTab==='manuals'){
    b.innerHTML = mod.resources.map(r=>{
      const [cls,em] = ICONS[r.type]||ICONS.pdf;
      return `<a class="res" href="${r.url}">
        <div class="ic ${cls}">${em}</div>
        <div class="meta"><div class="h">${r.title}</div><div class="s">${r.sub}</div></div>
        <div class="chev">›</div></a>`;
    }).join('') || empty('No manuals linked yet.');
  } else if (activeTab==='videos'){
    b.innerHTML = mod.videos.map(vd=>`
      <div class="video-frame"><iframe src="${vd.embed}" allowfullscreen></iframe></div>
      <div class="res" style="cursor:default"><div class="ic vid">▶</div>
      <div class="meta"><div class="h">${vd.title}</div><div class="s">Training video</div></div></div>
    `).join('') || empty('No videos linked yet.');
  } else {
    b.innerHTML = `<div class="health-soon">
      <div class="big">Live health monitoring</div>
      Real-time module status, fault history, and sensor data will appear here once connected to site systems.</div>`;
  }
}
function empty(msg){ return `<div class="health-soon">${msg}</div>`; }

// ---- QR generation ----
function appBaseURL(){
  // When hosted, QR points to the real URL. Locally it points to this file.
  return location.href.split('#')[0];
}
function showQR(id){
  const mod = MODULES[id];
  const url = appBaseURL() + '#/module/' + id;
  document.getElementById('qr-name').textContent = mod ? mod.name : id;
  document.getElementById('qr-id').textContent = id;
  document.getElementById('qr-url').textContent = url;
  const box = document.getElementById('qrbox');
  box.innerHTML = '';
  new QRCode(box, { text:url, width:200, height:200, colorDark:'#14171c', colorLight:'#ffffff' });
  document.getElementById('modal').classList.add('show');
}
function closeQR(){ document.getElementById('modal').classList.remove('show'); }
function printQR(){
  const name = document.getElementById('qr-name').textContent;
  const id = document.getElementById('qr-id').textContent;
  const qrImg = document.querySelector('#qrbox img, #qrbox canvas');
  const data = qrImg.tagName==='IMG' ? qrImg.src : qrImg.toDataURL();
  const w = window.open('', '_blank');
  w.document.write(`<html><head><title>${id} label</title>
    <style>body{font-family:sans-serif;text-align:center;padding:40px}
    img{width:300px;height:300px}h2{margin:14px 0 2px}
    .c{font-family:monospace;color:#c1410f;font-size:18px}</style></head>
    <body><img src="${data}"><h2>${name}</h2><div class="c">${id}</div></body></html>`);
  w.document.close(); w.focus(); setTimeout(()=>w.print(),300);
}

window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
