name: Deploy Module Hub to GitHub Pages

# Deploys the static site (index.html + assets/ + vendor/) to GitHub Pages.
# One-time setup: repo Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions". After that, every push below publishes the site.

on:
  push:
    branches:
      - main
      - claude/vanderlande-qr-app-5npu93
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Repository root is the site root.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
